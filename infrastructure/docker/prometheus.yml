global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "blockguardian"
    environment: "local"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "blockguardian-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:9090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "mysql"
    static_configs:
      - targets: ["database:9104"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
