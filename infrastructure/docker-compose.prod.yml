# BlockGuardian Docker Compose - Production Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Production overrides: no build, pinned image tags, stricter resource limits, no exposed DB ports

version: "3.9"

services:
  frontend:
    image: blockguardian/frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    build: !reset null
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    image: blockguardian/backend:${IMAGE_TAG:?IMAGE_TAG is required}
    build: !reset null
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  database:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  redis:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  prometheus:
    restart: always
    ports:
      - "127.0.0.1:9091:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
