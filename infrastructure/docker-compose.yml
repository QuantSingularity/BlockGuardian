# BlockGuardian Docker Compose - Local Development
# Usage: docker-compose up -d
# Requires: .env file (copy from .env.example and fill in values)

version: "3.9"

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  database-net:
    driver: bridge
    internal: true

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

services:
  # ─────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: blockguardian/frontend:dev
    container_name: blockguardian-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - frontend-net
      - backend-net
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_ENV=development
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: blockguardian/backend:dev
    container_name: blockguardian-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - backend-net
      - database-net
    environment:
      - NODE_ENV=development
      - PORT=8080
      - METRICS_PORT=9090
      - LOG_LEVEL=debug
      - ENABLE_AUDIT_LOGS=true
      - SECURITY_HEADERS_ENABLED=true
      - RATE_LIMITING_ENABLED=true
      - DATABASE_HOST=database
      - DATABASE_PORT=3306
      - DATABASE_NAME=${DB_NAME:-blockguardian}
      - DATABASE_USER=${DB_USER:-bguser}
      - DATABASE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - API_KEY=${API_KEY:-dev-api-key}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health/live",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - type: tmpfs
        target: /tmp
      - type: tmpfs
        target: /var/log/app

  # ─────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: blockguardian-database
    restart: unless-stopped
    networks:
      - database-net
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=${DB_NAME:-blockguardian}
      - MYSQL_USER=${DB_USER:-bguser}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${DB_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blockguardian-redis
    restart: unless-stopped
    networks:
      - database-net
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-dev-pass} --loglevel notice
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis-dev-pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────
  # Prometheus (Monitoring)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: blockguardian-prometheus
    restart: unless-stopped
    networks:
      - backend-net
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # Grafana (Dashboards)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: blockguardian-grafana
    restart: unless-stopped
    networks:
      - backend-net
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin-dev-pass}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
