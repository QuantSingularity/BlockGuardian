---
# Main Playbook for Financial-Grade Infrastructure
# This playbook implements comprehensive security hardening and compliance measures

- name: Security Hardening and Compliance Setup
  hosts: all
  become: true
  gather_facts: true
  vars:
    compliance_standards:
      - PCI-DSS
      - SOC2
      - ISO27001
    security_baseline: financial_grade

  pre_tasks:
    - name: Verify system requirements
      assert:
        that:
          - ansible_os_family == "RedHat" or ansible_os_family == "Debian"
          - ansible_architecture == "x86_64"
        fail_msg: "System does not meet minimum requirements for financial-grade deployment"

    - name: Ensure audit log directory exists
      file:
        path: /var/log
        state: directory
        mode: "0755"
      tags: [audit]

    - name: Create audit log entry for playbook execution
      lineinfile:
        path: /var/log/ansible-audit.log
        line: "{{ ansible_date_time.iso8601 }} - Ansible playbook started by {{ ansible_user_id }} from {{ (ansible_env.SSH_CLIENT | default('localhost')).split()[0] }}"
        create: yes
        mode: "0600"
      tags: [audit]

  roles:
    - role: common
      tags: [common, security, hardening]
    - role: security_hardening
      tags: [security, hardening, compliance]

  post_tasks:
    - name: Generate compliance report
      copy:
        content: |
          {
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "hostname": "{{ inventory_hostname }}",
            "os_family": "{{ ansible_os_family }}",
            "compliance_standards": {{ compliance_standards | to_json }},
            "security_baseline": "{{ security_baseline }}",
            "status": "completed"
          }
        dest: "/var/log/compliance-{{ ansible_date_time.date }}.json"
        mode: "0600"
      tags: [compliance, reporting]

    - name: Create audit log entry for playbook completion
      lineinfile:
        path: /var/log/ansible-audit.log
        line: "{{ ansible_date_time.iso8601 }} - Ansible playbook completed successfully on {{ inventory_hostname }}"
        mode: "0600"
      tags: [audit]

- name: Configure Web Servers with Enhanced Security
  hosts: webservers
  become: true
  gather_facts: true
  vars:
    web_security_level: maximum
    enable_waf: true
    ssl_only: true

  roles:
    - role: webserver
      tags: [webserver, nginx]

- name: Configure Database Servers with Financial-Grade Security
  hosts: databases
  become: true
  gather_facts: true
  vars:
    db_security_level: maximum
    enable_encryption: true
    audit_all_queries: true

  roles:
    - role: database
      tags: [database, mysql]

- name: Final Security Validation and Compliance Check
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Verify critical services are running (RedHat)
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - firewalld
        - auditd
      when: ansible_os_family == "RedHat"
      ignore_errors: yes
      tags: [validation]

    - name: Verify critical services are running (Debian)
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - ufw
        - auditd
      when: ansible_os_family == "Debian"
      ignore_errors: yes
      tags: [validation]

    - name: Record final validation in audit log
      lineinfile:
        path: /var/log/ansible-audit.log
        line: "{{ ansible_date_time.iso8601 }} - Final validation completed on {{ inventory_hostname }}"
        mode: "0600"
      tags: [audit, always]

    - name: Display completion summary
      debug:
        msg: "Security hardening completed on {{ inventory_hostname }} ({{ ansible_os_family }})"
      tags: [always]
