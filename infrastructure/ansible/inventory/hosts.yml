---
# inventory/hosts.yml
# Copy hosts.example.yml to this file and update with real IPs/hostnames
# This file should NOT be committed with real IPs - use vault or environment vars

all:
  children:
    webservers:
      hosts:
        web1:
          ansible_host: "{{ lookup('env', 'WEB1_IP') | default('10.0.1.10') }}"
        web2:
          ansible_host: "{{ lookup('env', 'WEB2_IP') | default('10.0.1.11') }}"
    databases:
      hosts:
        db1:
          ansible_host: "{{ lookup('env', 'DB1_IP') | default('10.0.2.10') }}"
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') | default('~/.ssh/blockguardian-key.pem') }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=yes"
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: true
    ansible_become_method: sudo
    app_name: blockguardian
