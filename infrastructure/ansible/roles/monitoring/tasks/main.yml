---
# roles/monitoring/tasks/main.yml
# Installs and configures Prometheus node exporter and log shipping

- name: Install monitoring packages (RedHat)
  yum:
    name:
      - rsyslog
      - logrotate
    state: present
  when: ansible_os_family == "RedHat"

- name: Install monitoring packages (Debian)
  apt:
    name:
      - rsyslog
      - logrotate
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Create prometheus node exporter user
  user:
    name: node_exporter
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Download Prometheus node exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"
  register: download_result

- name: Extract node exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes
  when: download_result.changed

- name: Install node exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: "0755"
    remote_src: yes
  notify: Restart node_exporter

- name: Create node exporter systemd service
  copy:
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter \
        --collector.systemd \
        --collector.processes \
        --web.listen-address=:9100
      Restart=always
      RestartSec=3
      NoNewPrivileges=yes
      ProtectSystem=strict
      ProtectHome=yes
      PrivateTmp=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Start and enable node exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes

- name: Configure logrotate for application logs
  copy:
    content: |
      /var/log/app/*.log {
          daily
          missingok
          rotate 14
          compress
          delaycompress
          notifempty
          create 0640 root adm
          sharedscripts
          postrotate
              /usr/bin/systemctl reload rsyslog > /dev/null 2>&1 || true
          endscript
      }
    dest: /etc/logrotate.d/blockguardian
    mode: "0644"
