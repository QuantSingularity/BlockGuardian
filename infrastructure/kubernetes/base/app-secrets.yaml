apiVersion: v1
kind: Secret
metadata:
  name: blockguardian-secrets
  labels:
    app: blockguardian
    component: secrets
  annotations:
    kubernetes.io/description: "BlockGuardian application secrets - managed via external secret manager in production"
type: Opaque
stringData:
  database-url: "mysql://bguser:CHANGE_ME@blockguardian-database:3306/blockguardian"
  mysql-root-password: "CHANGE_ME_ROOT"
  mysql-password: "CHANGE_ME"
  jwt-secret: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS"
  api-key: "CHANGE_ME_API_KEY"
