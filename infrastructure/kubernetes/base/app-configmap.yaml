apiVersion: v1
kind: ConfigMap
metadata:
  name: blockguardian-config
  labels:
    app: blockguardian
    component: config
data:
  API_URL: "http://blockguardian-backend"
  REDIS_HOST: "blockguardian-redis"
  REDIS_PORT: "6379"
  DATABASE_HOST: "blockguardian-database"
  DATABASE_PORT: "3306"
  DATABASE_NAME: "blockguardian"
  DATABASE_USER: "bguser"
  LOG_LEVEL: "info"
  ENABLE_AUDIT_LOGS: "true"
  SECURITY_HEADERS_ENABLED: "true"
  RATE_LIMITING_ENABLED: "true"
  COMPLIANCE_MODE: "financial-grade"
