apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockguardian-backend
  labels:
    app: blockguardian-backend
    component: backend
    tier: application
    version: "1.0.0"
    compliance: "pci-dss,soc2,iso27001"
  annotations:
    deployment.kubernetes.io/revision: "1"
    security.policy/level: "financial-grade"
    compliance.standards: "PCI-DSS,SOC2,ISO27001"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: blockguardian-backend
      component: backend
  template:
    metadata:
      labels:
        app: blockguardian-backend
        component: backend
        tier: application
        version: "1.0.0"
        compliance: "pci-dss,soc2,iso27001"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        security.policy/level: "financial-grade"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups: [10001]
      serviceAccountName: blockguardian-backend-sa
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - blockguardian-backend
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: NotIn
                    values:
                      - spot
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "application"
          effect: "NoSchedule"
      initContainers:
        - name: security-init
          image: alpine:3.18
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              echo "Initializing security context..."
              echo "Verifying file permissions..."
              ls -la /app || true
              echo "Security initialization complete"
          volumeMounts:
            - name: app-volume
              mountPath: /app
            - name: tmp-volume
              mountPath: /tmp
      containers:
        - name: blockguardian-backend
          image: blockguardian/backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            limits:
              cpu: "1000m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: "info"
            - name: ENABLE_AUDIT_LOGS
              value: "true"
            - name: SECURITY_HEADERS_ENABLED
              value: "true"
            - name: RATE_LIMITING_ENABLED
              value: "true"
            - name: ENCRYPTION_AT_REST
              value: "true"
            - name: COMPLIANCE_MODE
              value: "financial-grade"
          envFrom:
            - secretRef:
                name: blockguardian-secrets
            - configMapRef:
                name: blockguardian-config
          volumeMounts:
            - name: app-volume
              mountPath: /app
            - name: tmp-volume
              mountPath: /tmp
            - name: logs-volume
              mountPath: /var/log/app
            - name: config-volume
              mountPath: /etc/app
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
              scheme: HTTP
              httpHeaders:
                - name: User-Agent
                  value: "k8s-liveness-probe"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
              scheme: HTTP
              httpHeaders:
                - name: User-Agent
                  value: "k8s-readiness-probe"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Graceful shutdown initiated..."
                    sleep 15
                    echo "Shutdown complete"
        - name: log-shipper
          image: fluent/fluent-bit:2.1
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: logs-volume
              mountPath: /var/log/app
              readOnly: true
            - name: fluentbit-config
              mountPath: /fluent-bit/etc
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: app-volume
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp-volume
          emptyDir:
            sizeLimit: 100Mi
        - name: logs-volume
          emptyDir:
            sizeLimit: 500Mi
        - name: config-volume
          configMap:
            name: blockguardian-config
            defaultMode: 0644
        - name: fluentbit-config
          configMap:
            name: blockguardian-fluentbit-config
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "2"
          - name: edns0
      terminationGracePeriodSeconds: 30
      priorityClassName: high-priority
      restartPolicy: Always
