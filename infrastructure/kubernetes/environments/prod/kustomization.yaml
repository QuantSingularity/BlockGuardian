apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

images:
  - name: blockguardian/backend
    newTag: v1.0.0
  - name: blockguardian/frontend
    newTag: v1.0.0

replicas:
  - name: prod-blockguardian-backend
    count: 3
  - name: prod-blockguardian-frontend
    count: 3

configMapGenerator:
  - name: blockguardian-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn

# IMPORTANT: Use external secret management in production.
# Never commit real secrets to Git.
# Options: AWS Secrets Manager + External Secrets Operator, HashiCorp Vault, Sealed Secrets
#
# Example with External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: blockguardian-secrets
# spec:
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: ClusterSecretStore
#   target:
#     name: blockguardian-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: mysql-root-password
#       remoteRef:
#         key: prod/blockguardian/mysql-root-password
#     - secretKey: mysql-password
#       remoteRef:
#         key: prod/blockguardian/mysql-password
#     - secretKey: jwt-secret
#       remoteRef:
#         key: prod/blockguardian/jwt-secret
#     - secretKey: api-key
#       remoteRef:
#         key: prod/blockguardian/api-key
#     - secretKey: database-url
#       remoteRef:
#         key: prod/blockguardian/database-url

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Ingress
      name: prod-blockguardian-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: blockguardian.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: blockguardian.com
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
  - target:
      kind: Deployment
      name: prod-blockguardian-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
