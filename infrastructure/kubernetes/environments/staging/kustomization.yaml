apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

images:
  - name: blockguardian/backend
    newTag: staging-latest
  - name: blockguardian/frontend
    newTag: staging-latest

replicas:
  - name: staging-blockguardian-backend
    count: 2
  - name: staging-blockguardian-frontend
    count: 2

configMapGenerator:
  - name: blockguardian-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=info

# In production environments use external secrets manager (AWS Secrets Manager, Vault, Sealed Secrets)
# Replace these placeholders with your secret management solution
secretGenerator:
  - name: blockguardian-secrets
    behavior: replace
    literals:
      - database-url=REPLACE_WITH_ACTUAL_SECRET
      - mysql-root-password=REPLACE_WITH_ACTUAL_SECRET
      - mysql-password=REPLACE_WITH_ACTUAL_SECRET
      - jwt-secret=REPLACE_WITH_ACTUAL_SECRET
      - api-key=REPLACE_WITH_ACTUAL_SECRET

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Ingress
      name: staging-blockguardian-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.blockguardian.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.blockguardian.com
