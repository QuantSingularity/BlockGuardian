apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: dev

images:
  - name: blockguardian/backend
    newTag: dev-latest
  - name: blockguardian/frontend
    newTag: dev-latest

replicas:
  - name: dev-blockguardian-backend
    count: 1
  - name: dev-blockguardian-frontend
    count: 1

configMapGenerator:
  - name: blockguardian-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug

secretGenerator:
  - name: blockguardian-secrets
    behavior: replace
    literals:
      - database-url=mysql://bguser:dev-password@dev-blockguardian-database:3306/blockguardian
      - mysql-root-password=dev-root-password
      - mysql-password=dev-password
      - jwt-secret=dev-jwt-secret-change-in-production-min32
      - api-key=dev-api-key

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Ingress
      name: dev-blockguardian-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.blockguardian.local
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.blockguardian.local
