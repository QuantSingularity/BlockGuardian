version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: blockguardian_postgres
    environment:
      POSTGRES_DB: blockguardian
      POSTGRES_USER: blockguardian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blockguardian_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - blockguardian_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockguardian -d blockguardian"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: blockguardian_redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - blockguardian_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Backend API Server (Production)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: blockguardian_backend
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://blockguardian:${POSTGRES_PASSWORD:-blockguardian_password}@postgres:5432/blockguardian
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-secret-key-32chars}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-jwt-key-32chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=5000
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_backups:/app/backups
    ports:
      - "5000:5000"
    networks:
      - blockguardian_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend (Development mode with hot-reload)
  backend_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: blockguardian_backend_dev
    profiles:
      - dev
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://blockguardian:${POSTGRES_PASSWORD:-blockguardian_password}@postgres:5432/blockguardian
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-key}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "5000:5000"
    networks:
      - blockguardian_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: blockguardian_celery_worker
    command: >
      celery -A src.main:celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,high_priority,compliance
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://blockguardian:${POSTGRES_PASSWORD:-blockguardian_password}@postgres:5432/blockguardian
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-secret-key-32chars}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-jwt-key-32chars}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/3
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - blockguardian_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: blockguardian_celery_beat
    command: >
      celery -A src.main:celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://blockguardian:${POSTGRES_PASSWORD:-blockguardian_password}@postgres:5432/blockguardian
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-secret-key-32chars}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-jwt-key-32chars}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/3
    volumes:
      - backend_logs:/app/logs
    networks:
      - blockguardian_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: blockguardian_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - blockguardian_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: blockguardian_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - blockguardian_network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.4.0
    container_name: blockguardian_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_password}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - blockguardian_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Ganache (blockchain dev node) - only with --profile blockchain
  ganache:
    image: trufflesuite/ganache:latest
    container_name: blockguardian_ganache
    profiles:
      - blockchain
    ports:
      - "8545:8545"
    networks:
      - blockguardian_network
    command: >
      --deterministic
      --accounts 10
      --host 0.0.0.0
      --port 8545
      --networkId 1337
      --gasLimit 10000000
      --gasPrice 20000000000
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  backend_backups:
    driver: local
  nginx_logs:
    driver: local

networks:
  blockguardian_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
